{% extends "base.html" %}

{% block title %}编辑草稿 · AI Radar{% endblock %}

{% block content %}
<a class="back-link" href="/topics/{{ draft.topic_id }}">← 返回话题详情</a>
<header class="mt-5 mb-7"><p class="text-sm text-cyan-300">{{ draft.topic.title }}</p><h1 class="mt-2 text-3xl font-bold text-white">编辑草稿</h1><p class="mt-2 text-slate-400">所有内容可手动调整；保存后可导出 Markdown 文件。</p></header>
<form class="grid gap-6 lg:grid-cols-[1fr_19rem]" hx-post="/drafts/{{ draft.id }}" hx-target="#save-feedback" hx-swap="innerHTML" hx-indicator="#save-indicator">
  <section class="rounded-2xl border border-slate-800 bg-slate-900/60 p-5 sm:p-6"><div class="grid gap-5"><label><span class="form-label">写作模式</span><select class="field" name="mode">{% for option in ['新闻快讯', '编辑解读', '创作者选题', '技术拆解'] %}<option value="{{ option }}" {% if draft.mode == option %}selected{% endif %}>{{ option }}</option>{% endfor %}</select></label><label><span class="form-label">标题</span><input class="field" name="title" value="{{ draft.title }}" required></label><label><span class="form-label">Markdown 正文</span><textarea class="field min-h-80" name="content_markdown" required>{{ draft.content_markdown }}</textarea></label></div></section>
  <aside class="space-y-5"><section class="rounded-2xl border border-slate-800 bg-slate-900/60 p-5"><h2 class="font-semibold text-white">配图提示词</h2><p class="mt-2 text-sm leading-6 text-slate-400">未配置图像服务时，此提示词仍可用于后续人工生成配图。</p><textarea class="field mt-4 min-h-36" name="image_prompt">{{ draft.image_prompt }}</textarea></section><section class="rounded-2xl border border-slate-800 bg-slate-900/60 p-5"><div id="save-feedback" aria-live="polite"></div><p id="save-indicator" class="htmx-indicator mb-3 text-sm text-cyan-300">正在保存…</p><button class="action-button w-full" type="submit">保存草稿</button><a class="secondary-button mt-3 block w-full text-center" href="/drafts/{{ draft.id }}/export">导出 Markdown</a><p class="mt-4 text-xs leading-5 text-slate-500">上次更新：{{ draft.updated_at.strftime('%Y-%m-%d %H:%M') }}</p></section></aside>
</form>
{% endblock %}
